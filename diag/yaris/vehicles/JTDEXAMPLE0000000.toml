# Vehicle profile: 2011 Toyota Yaris 1NR-FE
# VIN-keyed; loaded by vehicle.py when --vehicle matches

[identity]
vin = "JTDEXAMPLE0000000"
model_year = 2011
platform = "XP90"
engine = "1NR-FE"
engine_displacement_l = 1.329
trans_candidates = ["C50 5MT", "U340E 4AT"]

[adapter]
# Bluetooth ELM327 clone
mac = "AA:BB:CC:DD:EE:FF"
pin = "1234"
spp_channel = 2
default_port = "/dev/rfcomm0"
default_baud = 38400

[protocol]
# ISO 15765-4 CAN 11-bit 500k
elm_protocol_number = 6
ecm_request_id = "7E0"
ecm_response_id = "7E8"
functional_broadcast = "7DF"

[expected]
idle_rpm = [650, 850]
coolant_warm_c = [85, 98]
iat_c = [10, 60]
batt_v_engine_off = [12.0, 12.7]
batt_v_engine_running = [13.4, 14.5]
stft_pct = [-7.0, 7.0]
ltft_pct = [-7.0, 7.0]
maf_idle_gs = [2.0, 4.5]
lambda_value = [0.97, 1.03]
timing_adv_idle = [4.0, 14.0]
cat_temp_c = [400, 750]

[physics]
air_density_g_l = 1.20
